<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>暴走老铁 Rampage Bro - iOS Enhanced</title>
<!--
  暴走老铁（Rampage Bro）— 单文件像素横版射击（致敬合金弹头）
  操作（键鼠）：A/D 移动，W/空格 跳，S 蹲，鼠标瞄准，左键射击，右键手雷，Q 大招，E 上下载具
  操作（键盘）：←→ 移动，↑ 抬枪 ↓ 蹲，J/Z 射击，K/X 跳，L/C 手雷，I/V 大招，E 载具
  手机：左侧虚拟摇杆移动/抬枪/蹲，右侧按钮射击/跳跃/手雷/大招/载具/暂停
  通用：P/Esc 暂停，M 静音
  调试：URL 加 ?debug=1（G 无敌，1-5 跳关，7 换武器，T 自杀，F 充满大招）
-->
<style>
html,body{margin:0;width:100%;height:100%;background:#0a0d12;overflow:hidden;position:fixed;inset:0;touch-action:none;overscroll-behavior:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
body{font-family:"Microsoft YaHei",system-ui,sans-serif}
canvas{position:absolute;inset:0;margin:auto;image-rendering:pixelated;image-rendering:crisp-edges;cursor:none;touch-action:none}
#touch-ui{display:none;position:fixed;inset:0;z-index:5;pointer-events:none}
.touchable #touch-ui{display:block}
#stick{position:absolute;left:calc(18px + env(safe-area-inset-left));bottom:calc(18px + env(safe-area-inset-bottom));width:116px;height:116px;border:2px solid rgba(200,212,224,.55);border-radius:50%;background:rgba(16,19,26,.28);box-shadow:0 0 0 2px rgba(0,0,0,.18) inset;pointer-events:auto;touch-action:none}
#stick-knob{position:absolute;left:38px;top:38px;width:40px;height:40px;border-radius:50%;background:rgba(242,201,76,.82);box-shadow:0 0 0 3px rgba(16,19,26,.45)}
.touch-buttons{position:absolute;right:calc(14px + env(safe-area-inset-right));bottom:calc(16px + env(safe-area-inset-bottom));width:184px;height:148px;pointer-events:none}
.tbtn{position:absolute;width:48px;height:48px;border:2px solid rgba(242,246,250,.54);border-radius:50%;background:rgba(16,19,26,.42);color:#f2f6fa;font:bold 17px system-ui,sans-serif;text-align:center;line-height:44px;padding:0;pointer-events:auto;touch-action:none}
.tbtn:active,.tbtn.down{background:rgba(242,201,76,.82);color:#10131a}
.t-fire{right:0;bottom:44px;width:74px;height:74px;line-height:normal;font-size:0}
.t-fire .aim-knob{position:absolute;left:50%;top:50%;width:26px;height:26px;margin:-13px 0 0 -13px;border-radius:50%;background:#f2f6fa;color:#10131a;font:bold 16px/26px system-ui,sans-serif;box-shadow:0 0 0 2px rgba(16,19,26,.35);transition:transform .04s linear}
.t-fire.down .aim-knob{background:#10131a;color:#f2c94c}
.t-jump{right:70px;bottom:70px}.t-nade{right:70px;bottom:14px}.t-super{right:126px;bottom:42px}.t-veh{right:16px;bottom:116px}.t-pause{right:138px;bottom:104px;width:38px;height:38px;line-height:34px;font-size:15px}
@media (orientation:portrait){#stick{width:104px;height:104px}#stick-knob{left:34px;top:34px;width:36px;height:36px}.touch-buttons{transform:scale(.9);transform-origin:right bottom}}
</style>
</head>
<body>
<canvas id="game" width="480" height="270"></canvas>
<div id="touch-ui" aria-hidden="true">
 <div id="stick"><div id="stick-knob"></div></div>
 <div class="touch-buttons">
  <button class="tbtn t-fire" data-touch="fire"><span class="aim-knob">●</span></button>
  <button class="tbtn t-jump" data-touch="jump">跳</button>
  <button class="tbtn t-nade" data-touch="nade">雷</button>
  <button class="tbtn t-super" data-touch="super">招</button>
  <button class="tbtn t-veh" data-touch="veh">E</button>
  <button class="tbtn t-pause" data-touch="pause">Ⅱ</button>
 </div>
</div>
<script>
'use strict';
/* ==================== §1 CONST ==================== */
const VW=480,VH=270,GRAV=900;
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const IS_TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints||0)>0||/[?&]touch=1/.test(location.search);
if(IS_TOUCH)document.documentElement.classList.add('touchable');
ctx.imageSmoothingEnabled=false;
function fit(){const raw=Math.min(innerWidth/VW,innerHeight/VH),s=IS_TOUCH?Math.max(0.45,raw):Math.max(1,Math.floor(raw));
const w=Math.max(1,Math.floor(VW*s)),h=Math.max(1,Math.floor(VH*s));
cv.style.width=w+'px';cv.style.height=h+'px';cv._scale=w/VW;}
addEventListener('resize',fit);fit();
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const rnd=(a,b)=>a+Math.random()*(b-a);
const irnd=(a,b)=>Math.floor(rnd(a,b+1));
const lerp=(a,b,t)=>a+(b-a)*t;
const chance=p=>Math.random()<p;
const dist2=(ax,ay,bx,by)=>(ax-bx)*(ax-bx)+(ay-by)*(ay-by);
// 调色板：字符 -> 颜色（'.'=透明）
const PAL={'.':null,'0':'#10131a','1':'#1a2233','2':'#2a3650','G':'#8a96a8','g':'#5a6678',
'W':'#f2f6fa','w':'#c8d4e0','B':'#3d6fd6','b':'#7aa2ff','d':'#274a9e',
'R':'#d63d3d','r':'#ff8a7a','S':'#e8dcc8','s':'#bfae8e','k':'#8c7a5c',
'Y':'#f2c94c','F':'#ffe9b0','K':'#5a4632','P':'#d678c8','C':'#62d6c8','c':'#3a9e92',
'O':'#e8853d','o':'#ffb47a','E':'#f2b09a','e':'#d68f78','N':'#3a4252','L':'#9ef27a'};
const DEBUG=/[?&]debug=1/.test(location.search);
const HARD={initialLives:4,initialNades:4,enemyHp:1.14,enemySpeed:1.08,perLevelHp:0.18,perLevelSpeed:0.10,bossHp:1.12,bossPerLevel:0.08,hostileSpeedPerLevel:0.06};
const PLAYER_SCALE=1.38,ENEMY_SCALE=1.65,ENEMY_MIN_HEIGHT=Math.round(38*PLAYER_SCALE*0.5);
let god=false;

/* ==================== §2 AUDIO ==================== */
const Audio2={ac:null,muted:false,bgm:null,bgmStep:0,bgmNext:0,
unlock(){if(!this.ac){try{this.ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
 if(this.ac&&this.ac.state==='suspended')this.ac.resume();
 if(this.ac&&!this._unlocked){this._unlocked=true;
  try{const buf=this.ac.createBuffer(1,1,22050);const src=this.ac.createBufferSource();
   src.buffer=buf;src.connect(this.ac.destination);src.start(0);}catch(e){}}},
osc(type,f0,f1,dur,vol,when){const ac=this.ac;if(!ac||this.muted)return;
 const t=when||ac.currentTime,o=ac.createOscillator(),g=ac.createGain();
 o.type=type;o.frequency.setValueAtTime(f0,t);
 if(f1!==f0)o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
 g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
 o.connect(g).connect(ac.destination);o.start(t);o.stop(t+dur+0.02);},
noise(dur,vol,fc,when){const ac=this.ac;if(!ac||this.muted)return;
 const t=when||ac.currentTime,n=ac.sampleRate*dur|0,buf=ac.createBuffer(1,n,ac.sampleRate),d=buf.getChannelData(0);
 for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
 const src=ac.createBufferSource();src.buffer=buf;
 const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=fc||1200;
 const g=ac.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
 src.connect(f).connect(g).connect(ac.destination);src.start(t);},
sfx(n){const A=this;switch(n){
 case 'shoot':A.osc('square',880,440,0.06,0.12);break;
 case 'mg':A.osc('square',990,520,0.03,0.09);break;
 case 'plate':A.osc('sawtooth',300,140,0.18,0.14);break;
 case 'cement':A.noise(0.06,0.05,700);break;
 case 'fix':A.osc('square',1200,600,0.1,0.1);A.noise(0.05,0.04,2000);break;
 case 'boom':A.noise(0.4,0.3,500);A.osc('sine',120,40,0.4,0.25);break;
 case 'melee':A.osc('sawtooth',220,90,0.1,0.16);break;
 case 'hit':A.noise(0.05,0.12,1800);break;
 case 'crack':A.noise(0.15,0.18,900);A.osc('triangle',200,80,0.12,0.1);break;
 case 'pickup':A.osc('square',660,660,0.07,0.12);A.osc('square',990,990,0.08,0.12,A.ac&&A.ac.currentTime+0.08);break;
 case 'rescue':[523,659,784].forEach((f,i)=>A.osc('square',f,f,0.1,0.12,A.ac&&A.ac.currentTime+i*0.09));break;
 case 'die':A.osc('sawtooth',440,110,0.5,0.2);break;
 case 'promote':[392,523,659,784].forEach((f,i)=>A.osc('square',f,f,0.16,0.14,A.ac&&A.ac.currentTime+i*0.13));break;
 case 'bossroar':A.osc('sawtooth',90,55,0.7,0.3);A.osc('sawtooth',140,70,0.7,0.2);A.noise(0.5,0.15,300);break;
 case 'stun':A.noise(0.25,0.1,3500);break;
 case 'jump':A.osc('square',330,520,0.08,0.07);break;
 case 'nade':A.osc('triangle',500,300,0.1,0.1);break;
 case 'super':[262,330,392,523,659].forEach((f,i)=>A.osc('sawtooth',f,f,0.2,0.14,A.ac&&A.ac.currentTime+i*0.08));break;
 case 'veh':A.osc('sawtooth',150,260,0.25,0.14);break;
}},
// 16 步音序器：track={bpm,bass:[16],lead:[16],noise:[16]}，音符=半音号(0=休止,69=A4)
midi(m){return 440*Math.pow(2,(m-69)/12);},
play(track){this.bgm=track;this.bgmStep=0;this.bgmNext=0;},
stop(){this.bgm=null;},
update(){const ac=this.ac;if(!ac||!this.bgm||this.muted)return;
 const spb=60/this.bgm.bpm/4;
 if(this.bgmNext<ac.currentTime)this.bgmNext=ac.currentTime+0.05;
 while(this.bgmNext<ac.currentTime+0.12){const s=this.bgmStep&15,t=this.bgmNext,tr=this.bgm;
  if(tr.bass[s])this.osc('triangle',this.midi(tr.bass[s]),this.midi(tr.bass[s]),spb*0.9,0.08,t);
  if(tr.lead[s])this.osc('square',this.midi(tr.lead[s]),this.midi(tr.lead[s]),spb*0.8,0.05,t);
  if(tr.noise[s])this.noise(0.03,0.05,tr.noise[s]>1?6000:2500,t);
  this.bgmStep++;this.bgmNext+=spb;}}
};
// 曲库（后续任务补全每关曲目）
const T_main={bpm:112,
 bass:[45,0,45,0,52,0,45,0,43,0,43,0,50,0,43,0],
 lead:[69,0,72,74,0,72,69,0,67,69,0,64,0,67,69,0],
 noise:[2,0,1,0,2,0,1,1,2,0,1,0,2,0,1,1]};
addEventListener('pointerdown',()=>Audio2.unlock());
addEventListener('keydown',()=>Audio2.unlock());
addEventListener('touchstart',()=>Audio2.unlock(),{passive:true});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&Audio2.ac&&Audio2.ac.state==='suspended')Audio2.ac.resume();});
addEventListener('touchmove',e=>{if(IS_TOUCH)e.preventDefault();},{passive:false});
addEventListener('gesturestart',e=>e.preventDefault());

/* ==================== §4 INPUT ==================== */
const Input={keys:{},pressed:{},mx:VW/2,my:VH/2,m0:false,m2:false,m0P:false,m2P:false,touchAim:null,
usingMouse:true,_seq:'',
get l(){return this.keys.ArrowLeft||this.keys.KeyA||this.keys.TouchLeft;},
get r(){return this.keys.ArrowRight||this.keys.KeyD||this.keys.TouchRight;},
get up(){return this.keys.ArrowUp||this.keys.TouchUp;},
get down(){return this.keys.ArrowDown||this.keys.KeyS||this.keys.TouchDown;},
get fire(){return this.keys.KeyJ||this.keys.KeyZ||this.m0;},
get fireP(){return this.pressed.KeyJ||this.pressed.KeyZ||this.m0P||this.pressed.TouchFire;},
get jumpP(){return this.pressed.KeyK||this.pressed.KeyX||this.pressed.Space||this.pressed.KeyW||this.pressed.TouchJump;},
get jump(){return this.keys.KeyK||this.keys.KeyX||this.keys.Space||this.keys.KeyW||this.keys.TouchJump;},
get nadeP(){return this.pressed.KeyL||this.pressed.KeyC||this.m2P||this.pressed.TouchNade;},
get superP(){return this.pressed.KeyQ||this.pressed.KeyI||this.pressed.KeyV||this.pressed.TouchSuper;},
get vehP(){return this.pressed.KeyE||this.pressed.TouchVeh;},
get pauseP(){return this.pressed.KeyP||this.pressed.Escape||this.pressed.TouchPause;},
get anyP(){return this.m0P||Object.keys(this.pressed).some(k=>k!=='KeyM'&&k!=='KeyP'&&k!=='Escape');},
endFrame(){this.pressed={};this.m0P=this.m2P=false;},
// 世界坐标瞄准向量（px,py=枪口世界坐标）
aim(px,py){if(this.touchAim)return{dx:this.touchAim.dx,dy:this.touchAim.dy};
 if(this.usingMouse){const wx=this.mx+cam.x,wy=this.my;
  let dx=wx-px,dy=wy-py;const l=Math.hypot(dx,dy)||1;return{dx:dx/l,dy:dy/l};}
 return null;}};
addEventListener('keydown',e=>{
 if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
 if(!Input.keys[e.code])Input.pressed[e.code]=true;
 Input.keys[e.code]=true;
 if(['KeyJ','KeyZ','KeyL','KeyC','ArrowUp','ArrowDown'].includes(e.code))Input.usingMouse=false;
 if(e.code==='KeyM')Audio2.muted=!Audio2.muted;
 // 调试序列 1145
 Input._seq=(Input._seq+(e.key||'')).slice(-4);if(Input._seq==='1145')location.search='?debug=1';
});
addEventListener('keyup',e=>{Input.keys[e.code]=false;});
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect(),s=cv._scale||1;
 Input.mx=clamp((e.clientX-r.left)/s,0,VW);Input.my=clamp((e.clientY-r.top)/s,0,VH);Input.usingMouse=true;});
cv.addEventListener('mousedown',e=>{Input.usingMouse=true;
 if(e.button===0){Input.m0=true;Input.m0P=true;}if(e.button===2){Input.m2=true;Input.m2P=true;}});
addEventListener('mouseup',e=>{if(e.button===0)Input.m0=false;if(e.button===2)Input.m2=false;});
cv.addEventListener('contextmenu',e=>e.preventDefault());
function touchKey(code,on){if(on&&!Input.keys[code])Input.pressed[code]=true;Input.keys[code]=on;}
function setupTouchControls(){
 if(!IS_TOUCH)return;
 const stick=document.getElementById('stick'),knob=document.getElementById('stick-knob');
 const base={pid:null,cx:0,cy:0};
 const clearStick=()=>{base.pid=null;['TouchLeft','TouchRight','TouchUp','TouchDown'].forEach(k=>touchKey(k,false));knob.style.transform='translate(0,0)';};
 const updateStick=e=>{
  const r=stick.getBoundingClientRect(),rad=r.width/2;Input.usingMouse=false;
  base.cx=r.left+rad;base.cy=r.top+rad;
  let dx=e.clientX-base.cx,dy=e.clientY-base.cy,len=Math.hypot(dx,dy);
  if(len>rad-12){dx*=((rad-12)/len);dy*=((rad-12)/len);len=rad-12;}
  const nx=dx/(rad-12),ny=dy/(rad-12);
  touchKey('TouchLeft',nx<-0.24);touchKey('TouchRight',nx>0.24);
  touchKey('TouchUp',ny<-0.42);touchKey('TouchDown',ny>0.46);
  knob.style.transform='translate('+Math.round(dx)+'px,'+Math.round(dy)+'px)';
 };
 stick.addEventListener('pointerdown',e=>{e.preventDefault();Audio2.unlock();base.pid=e.pointerId;stick.setPointerCapture&&stick.setPointerCapture(e.pointerId);updateStick(e);});
 stick.addEventListener('pointermove',e=>{if(e.pointerId===base.pid){e.preventDefault();updateStick(e);}});
 stick.addEventListener('pointerup',e=>{if(e.pointerId===base.pid){e.preventDefault();clearStick();}});
 stick.addEventListener('pointercancel',clearStick);
 const map={jump:'TouchJump',nade:'TouchNade',super:'TouchSuper',veh:'TouchVeh',pause:'TouchPause'};
 document.querySelectorAll('[data-touch]').forEach(btn=>{
  const act=btn.dataset.touch;
  if(act==='fire'){
   let firePid=null;const knob=btn.querySelector('.aim-knob');
   const updateFireAim=e=>{
    const r=btn.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,lim=r.width*0.42;
    let dx=e.clientX-cx,dy=e.clientY-cy,len=Math.hypot(dx,dy);
    if(len<8){const f=(typeof player!=='undefined'&&player.face<0)?-1:1;Input.touchAim={dx:f,dy:0};dx=f*lim*0.55;dy=0;}
    else{const ux=dx/len,uy=dy/len;Input.touchAim={dx:ux,dy:uy};if(len>lim){dx=ux*lim;dy=uy*lim;}}
    if(knob)knob.style.transform='translate('+Math.round(dx)+'px,'+Math.round(dy)+'px)';
   };
   const fireDown=e=>{e.preventDefault();Audio2.unlock();Input.usingMouse=false;firePid=e.pointerId;btn.setPointerCapture&&btn.setPointerCapture(e.pointerId);
    btn.classList.add('down');Input.m0=true;Input.m0P=true;Input.pressed.TouchFire=true;updateFireAim(e);};
   const fireMove=e=>{if(e.pointerId===firePid){e.preventDefault();updateFireAim(e);}};
   const fireUp=e=>{if(e&&e.pointerId!==undefined&&e.pointerId!==firePid)return;e&&e.preventDefault();firePid=null;btn.classList.remove('down');
    Input.m0=false;Input.touchAim=null;if(knob)knob.style.transform='translate(0,0)';};
   btn.addEventListener('pointerdown',fireDown);
   btn.addEventListener('pointermove',fireMove);
   btn.addEventListener('pointerup',fireUp);
   btn.addEventListener('pointercancel',fireUp);
   btn.addEventListener('lostpointercapture',fireUp);
   addEventListener('pointerup',fireUp,true);
   addEventListener('pointercancel',fireUp,true);
   return;
  }
  const down=e=>{e.preventDefault();Audio2.unlock();Input.usingMouse=false;btn.setPointerCapture&&btn.setPointerCapture(e.pointerId);btn.classList.add('down');
   touchKey(map[act],true);};
  const up=e=>{e&&e.preventDefault();btn.classList.remove('down');
   touchKey(map[act],false);};
  btn.addEventListener('pointerdown',down);
  btn.addEventListener('pointerup',up);
  btn.addEventListener('pointercancel',up);
  btn.addEventListener('lostpointercapture',up);
 });
 addEventListener('blur',()=>{clearStick();Input.m0=false;Object.keys(map).forEach(k=>touchKey(map[k],false));});
}
setupTouchControls();

/* ==================== §5 ENGINE ==================== */
function bake(rows){const h=rows.length,w=rows[0].length,c=document.createElement('canvas');
 c.width=w;c.height=h;const x=c.getContext('2d');
 for(let j=0;j<h;j++)for(let i=0;i<w;i++){const col=PAL[rows[j][i]];
  if(col){x.fillStyle=col;x.fillRect(i,j,1,1);}}return c;}
const bakeAnim=frames=>frames.map(bake);
// 绘制精灵（世界坐标，自动减摄像机；anchor=中下）
function drawSpr(img,x,y,flip){const px=Math.round(x-cam.x-img.width/2),py=Math.round(y-img.height);
 if(flip){ctx.save();ctx.translate(px+img.width,py);ctx.scale(-1,1);ctx.drawImage(img,0,0);ctx.restore();}
 else ctx.drawImage(img,px,py);}
function drawSprScaled(img,x,y,flip,scale){const w=img.width*scale,h=img.height*scale,px=Math.round(x-cam.x-w/2),py=Math.round(y-h);
 ctx.save();
 if(flip){ctx.translate(px+w,py);ctx.scale(-scale,scale);}
 else{ctx.translate(px,py);ctx.scale(scale,scale);}
 ctx.drawImage(img,0,0);ctx.restore();}
function rect(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(Math.round(x-cam.x),Math.round(y),w,h);}
function rectS(x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(Math.round(x),Math.round(y),w,h);} // 屏幕坐标
function txt(s,x,y,col,size,align){ctx.fillStyle=col||'#fff';ctx.font=(size||8)+'px "Microsoft YaHei",sans-serif';
 ctx.textAlign=align||'left';ctx.textBaseline='top';ctx.fillText(s,Math.round(x),Math.round(y));ctx.textAlign='left';}
const cam={x:0,lockX:null,shake:0};
// 镜头：跟随玩家只进不退；lockX 为推进上限（波次/BOSS战），到达后停住，不会跳跃甩开玩家
function camFollow(tx){
 const max=cam.lockX!==null?cam.lockX:1e9;
 const target=clamp(tx-VW*0.4,cam.x,max);
 cam.x=lerp(cam.x,target,0.15);}
function camShake(n){cam.shake=Math.max(cam.shake,n);}
// 粒子
const Particles={list:[],
 spawn(x,y,o){for(let i=0;i<(o.n||8);i++){const a=rnd(0,Math.PI*2),sp=rnd(0.3,1)*(o.spd||80);
  const max=IS_TOUCH?170:260;if(this.list.length>max)this.list.splice(0,this.list.length-max);
  this.list.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(o.up||40),t:0,
   life:rnd(0.5,1)*(o.life||0.6),col:Array.isArray(o.col)?o.col[irnd(0,o.col.length-1)]:(o.col||'#fff'),
   sz:o.sz||2,grav:o.grav===undefined?500:o.grav});}},
 bone(x,y){this.spawn(x,y,{n:10,col:['#f2f6fa','#c8d4e0','#e8dcc8'],spd:120,up:80,life:0.8});

  b.t+=dt;
  if(b.t>b.life){this.list.splice(i,1);continue;}

   for(const e of es){const d=dist2(b.x,b.y,e.x,e.y-e.h/2);if(d<bd){bd=d;best=e;}}

  const gw=groundY(this.x);
  if(gw!==null&&this.y-gw>14)this.x=ox;
  // 落地
  let gy=groundY(this.x);
  if(this.vy>=0){for(const s of solids){if(this.x>s.x&&this.x<s.x+s.w&&this.y>=s.y&&this.y-this.vy*dt<=s.y+4){gy=s.y;break;}}}

function spawnEnemy(type,x,yOff){const d=ENEMIES[type];
 const gy=groundY(x);const y=(d.ai==='dive')?(120+(yOff||0)):(gy!==null?gy:230);
 const li=(typeof Level!=='undefined'&&Level.cur)?Level.idx:0; // 敌人随关卡强化
 const esc=Math.max(ENEMY_SCALE,ENEMY_MIN_HEIGHT/d.h);
 return Ents.add({isEnemy:true,type,ai:d.ai,hp:Math.ceil(d.hp*HARD.enemyHp*(1+li*HARD.perLevelHp)),spd:d.spd*HARD.enemySpeed*(1+li*HARD.perLevelSpeed),score:d.score,w:Math.round(d.w*esc),h:Math.round(d.h*esc),sprScale:esc,
  x,y,y0:y,vx:0,vy:0,face:-1,t:rnd(0,1),phase:0,flash:0,slowT:0,turnT:0,kb:0,dead:false,
  upd:enemyUpd,drw:enemyDrw});}
function enemyUpd(dt,e){
 const ts=(G.adrT>0?0.55:1)*(e.slowT>0?0.4:1);dt*=ts;
 e.t+=dt;if(e.flash>0)e.flash-=dt;if(e.slowT>0)e.slowT-=dt;if(e.turnT>0)e.turnT-=dt;
 if(e.kb){e.x+=e.kb*dt;e.kb*=0.8;if(Math.abs(e.kb)<5)e.kb=0;}
 const px=player.x,toP=px-e.x;if(e.turnT<=0)e.face=toP>0?1:-1;
 switch(e.ai){
 case 'crawl':e.x+=e.face*e.spd*dt;snapGround(e);break;
 case 'pounce':
  if(e.phase===0){e.x+=e.face*e.spd*dt;snapGround(e);
   if(Math.abs(toP)<96){e.phase=1;e.t=0;}}
  else if(e.phase===1){if(e.t>0.5){e.phase=2;e.vx=e.face*200;e.vy=-285;}}
  else{e.vy+=GRAV*dt;e.x+=e.vx*dt;e.y+=e.vy*dt;const gy=groundY(e.x);
   if(gy!==null&&e.y>=gy&&e.vy>0){e.y=gy;e.phase=0;e.t=0;}}
  break;
 case 'dive':
  if(e.phase===0){e.y=e.y0+Math.sin(e.t*3)*12;e.x+=e.face*e.spd*0.4*dt;
   if(Math.abs(toP)<90&&player.y-e.y>20){e.phase=1;
    const l=Math.hypot(toP,player.y-14-e.y)||1;e.vx=toP/l*235;e.vy=(player.y-14-e.y)/l*235;}}
  else{e.x+=e.vx*dt;e.y+=e.vy*dt;const gy=groundY(e.x);
   if((gy!==null&&e.y>gy-4)||e.y<40){e.phase=0;e.t=0;e.y0=Math.min(e.y,140);}}
  break;
 case 'walk':if(e.flash<=0){e.x+=e.face*e.spd*dt;}snapGround(e);break;
 case 'lob':
  if(e.t>1.8){e.t=0;const dx=toP,fall=player.y-(e.y-14);
   const t0=0.9,vx=dx/t0,vy=(fall-0.5*GRAV*t0*t0)/t0;
   Bullets.hostile(e.x,e.y-14,clamp(vx,-180,180),clamp(vy,-300,100),{grav:GRAV,col:'#62d6c8',bw:5,bh:2});
   Audio2.sfx('shoot');}
  break;
 case 'shield':e.x+=e.face*e.spd*dt;snapGround(e);break;}
 // 碰玩家（外骨骼期反杀；载具碰撞由 Veh 处理）
 if(Math.abs(e.x-player.x)<(e.w+10)/2&&player.y>e.y-e.h-4&&player.top()<e.y){
  if(G.superT>0)killEnemy(e);
  else if(player.state==='normal'&&player.invT<=0&&!player.inVeh)killPlayer();}
}
function turnEnemy(e,dir){e.face=dir;e.turnT=0.75;e.x+=dir*Math.max(4,e.w*0.35);}
function snapGround(e){const gy=groundY(e.x);
 if(gy===null||e.y-gy>14){turnEnemy(e,-e.face);return;} // 悬崖或高墙：折返
 e.y=gy;
 const step=Math.max(8,e.w*0.55),fx=e.x+e.face*step,fg=groundY(fx);
 const left=cam.x+8,right=(cam.lockX!==null?cam.lockX+VW-12:Level.cur.len-8);
 if(e.x<left){turnEnemy(e,1);return;}
 if(e.x>right){turnEnemy(e,-1);return;}
 if(fg===null||gy-fg>14||fg-gy>14)turnEnemy(e,-e.face);
}
function enemyDrw(e){const sp=ESPR[e.type];const f=(e.ai==='lob')?0:Math.floor(e.t*6)%sp.length;
 if(e.flash>0){ctx.globalAlpha=0.5;}
 if(e.slowT>0){ctx.globalAlpha=0.7;}
 // 盾兵画板默认朝左（盾在左列），其余画板默认朝右
 drawSprScaled(sp[f],e.x,e.y,e.type==='shield'?e.face>0:e.face<0,e.sprScale||1);
 ctx.globalAlpha=1;
 if(e.ai==='pounce'&&e.phase===1)rect(e.x-2,e.y-e.h-6,4,2,'#f2c94c'); // 蓄力提示
}

const Veh={cur:null,

   v.mounted=true;player.inVeh=v;v.mountCd=0.3;Audio2.sfx('veh');

  // 敌方子弹打载具在 Bullets 中处理
 },
 drive(dt){const v=this.cur;if(!v)return;
  const mv=(Input.r?1:0)-(Input.l?1:0);
  const ox=v.x;v.x+=mv*150*dt;if(mv)v.face=mv>0?1:-1;
  const gA=groundY(v.x+(mv>0?14:-14));
  if(gA===null||v.y-gA>14)v.x=ox; // 断轨/高台前停住

  if(Input.jumpP&&v.onG){v.vy=-250;Audio2.sfx('jump');}
  v.vy+=GRAV*dt;v.y+=v.vy*dt;
  const gy=groundY(v.x);
  if(gy!==null&&v.y>=gy&&v.vy>=0){v.y=gy;v.vy=0;v.onG=true;}else v.onG=false;
  player.x=v.x;player.y=v.y;player.face=v.face;

  v.fireCd-=dt;

   if(Input.touchAim||Input.usingMouse){a=Input.aim(v.x,v.y-18);v.face=a.dx>=0?1:-1;}
  if(Input.fire&&v.fireCd<=0){v.fireCd=0.05;
   Bullets.fire(v.x+a.dx*16,v.y-18+a.dy*8,a.dx,a.dy,'gatling',false);} // 载具不耗弹
  if(Input.nadeP)Nades.throw_(v.x,v.y-22,v.face);

   if(Math.abs(e.x-v.x)<(e.w+26)/2&&e.y>v.y-28){

 hitByBullet(b){const v=this.cur;

  else if(Math.floor(v.t*2)%2===0)txt('E 骑乘',X-cam.x-12,Y-44,'#62d6c8',8);

Boss.defs.snake={nm:'职称考核：医保审核蛇形机',hp:140,w:0,h:0,noBody:true,
 init(c){c.y=120;c.aux.trail=[];c.aux.segs=[];for(let i=0;i<8;i++)c.aux.segs.push({hp:8,alive:true});
  c.aux.atkT=0;c.aux.mode='swim';c.aux.split=false;},
 hitTest(c,b){
  // 头
  if(dist2(b.x,b.y,c.x,c.y)<13*13){Boss.hurt(b.dmg);return true;}
  // 身节
  const tr=c.aux.trail;
  for(let i=0;i<c.aux.segs.length;i++){const s=c.aux.segs[i];if(!s.alive)continue;
   const p=tr[tr.length-1-(i+1)*7];if(!p)continue;
   if(dist2(b.x,b.y,p.x,p.y)<10*10){s.hp-=b.dmg;Audio2.sfx('hit');
    if(s.hp<=0){s.alive=false;Particles.bone(p.x,p.y);G.addScore(200,p.x,p.y);Boss.cur.hp-=4;
     if(Boss.cur.hp<=0){Boss.cur.hp=0;Boss.cur.state='die';Boss.cur.t=0;Audio2.stop();}}
    return true;}}
  return false;},
 update(c,dt){const A=c.aux;
  A.atkT+=dt;
  if(A.mode==='swim'){
   c.x=c.ax+VW/2+Math.cos(c.t*0.8)*160;
   c.y=95+Math.sin(c.t*1.7)*55;
   if(A.atkT>3.0){A.atkT=0;
    if(chance(0.5)){A.mode='aimBite';A.bt=0;A.tx=player.x;A.ty=player.y-12;}
    else{Audio2.sfx('stun');
     for(let i=0;i<3;i++){const a=Math.atan2(player.y-12-c.y,player.x-c.x)+(i-1)*0.3;
      hb(c.x,c.y,Math.cos(a)*90,Math.sin(a)*90,{bw:8,bh:6,col:'#f2f6fa',life:4,stun:true});}}}}
  else if(A.mode==='aimBite'){A.bt+=dt;
   if(A.bt>0.6){A.mode='bite';A.bt=0;
    const l=Math.hypot(A.tx-c.x,A.ty-c.y)||1;
    c.vx=(A.tx-c.x)/l*380;c.vy=(A.ty-c.y)/l*380;Audio2.sfx('bossroar');}}
  else if(A.mode==='bite'){A.bt+=dt;
   c.x+=c.vx*dt;c.y+=c.vy*dt;
   if(A.bt>0.55||c.y>225||c.x<c.ax+20||c.x>c.ax+VW-20){A.mode='swim';A.atkT=0;}}
  // 分裂
  if(!A.split&&c.hp<c.maxHp*0.5){A.split=true;Audio2.sfx('bossroar');
   for(let k=0;k<2;k++)spawnMiniSnake(c.ax+100+k*200,80+k*40);}
  // 轨迹
  A.trail.push({x:c.x,y:c.y});if(A.trail.length>80)A.trail.shift();
  // 碰撞玩家（头+身）
  if(player.state==='normal'&&player.invT<=0&&G.superT<=0&&!player.inVeh){
   if(dist2(player.x,player.y-12,c.x,c.y)<16*16)killPlayer();
   for(let i=0;i<A.segs.length;i++){if(!A.segs[i].alive)continue;
    const p=A.trail[A.trail.length-1-(i+1)*7];if(!p)continue;
    if(dist2(player.x,player.y-12,p.x,p.y)<13*13){killPlayer();break;}}}},
 draw(c){const A=c.aux;

  // 身节（机械×骨混合）
  for(let i=A.segs.length-1;i>=0;i--){const s=A.segs[i];if(!s.alive)continue;
   const p=A.trail[A.trail.length-1-(i+1)*7];if(!p)continue;
   const X=Math.round(p.x-cam.x),Y=Math.round(p.y);
   ctx.fillStyle=i%2?'#5a6678':'#e8dcc8';ctx.beginPath();ctx.arc(X,Y,8,0,7);ctx.fill();

  ctx.fillStyle='#8a96a8';ctx.beginPath();ctx.arc(X,Y,12,0,7);ctx.fill();

  ctx.fillStyle='#10131a';ctx.fillRect(X-6,Y+3,12,3); // 嘴
  txt('审',X-4,Y-18,'#f2f6fa',8);}};

 w:12,h:10,x,y,t:rnd(0,3),face:-1,flash:0,slowT:0,kb:0,dead:false,phase:0,vx:0,vy:0,

  if(G.superT>0&&dist2(player.x,player.y-12,e.x,e.y)<16*16)killEnemy(e);},

Boss.defs.boneking={nm:'终极考核：骨王·全骨骼聚合体',hp:240,w:54,h:50,
 init(c){c.aux.size=54;c.form=1;c.y=230;c.aux.lt=0;c.aux.st2=0;},
 update(c,dt){
  // 形态切换
  if(c.form===1&&c.hp<c.maxHp*0.66){c.form=2;c.state='shed';c.st=0;}
  if(c.form===2&&c.hp<c.maxHp*0.33){c.form=3;c.state='shed';c.st=0;c.x=c.ax+VW/2;}
  if(c.state==='shed'){c.inv=0.2;Particles.bone(c.x+rnd(-40,40),c.y-rnd(0,60));
   for(let i=Bullets.list.length-1;i>=0;i--)if(Bullets.list[i].hostile)Bullets.list.splice(i,1);
   if(c.st>2){c.state='idle';c.st=0;
    c.w=c.form===3?80:54;c.h=c.form===3?90:(c.form===2?80:50);Audio2.sfx('bossroar');}
   return;}
  if(c.form===1){ // 椎盘形态：强化翻滚+凝胶
   switch(c.state){
   case 'idle':if(c.st>0.7){c.state='roll';c.st=0;c.aux.trips=0;c.vx=(player.x>c.x?1:-1)*190;}break;
   case 'roll':c.x+=c.vx*dt;
    if(c.x<c.ax+40){c.vx=Math.abs(c.vx);c.aux.trips++;}
    if(c.x>c.ax+VW-40){c.vx=-Math.abs(c.vx);c.aux.trips++;}
    if(c.aux.trips>=4){c.state='spit';c.st=0;c.aux.shots=0;}break;
   case 'spit':
    if(c.st>0.4+c.aux.shots*0.3&&c.aux.shots<5){c.aux.shots++;
     hb(c.x,c.y-30,clamp((player.x-c.x)/0.8,-240,240)+rnd(-40,40),-190,{grav:GRAV,col:'#d678c8',bw:6,bh:6,gel:true});}
    if(c.aux.shots>=5&&c.st>2.5){c.state='idle';c.st=0;}break;}}
  else if(c.form===2){ // 巨像形态：踏波+骨刺雨+拒付单
   c.x+=clamp(player.x-c.x,-1,1)*12*dt;c.x=clamp(c.x,c.ax+80,c.ax+VW-60);
   switch(c.state){
   case 'idle':if(c.st>1){c.state=['stomp','rain','paper'][irnd(0,2)];c.st=0;c.aux.done=false;c.aux.spikes=null;}break;
   case 'stomp':
    if(c.st>0.55&&!c.aux.done){c.aux.done=true;camShake(3);Audio2.sfx('boom');
     hb(c.x+30,224,170,0,{bw:12,bh:9,col:'#e8853d',life:3});
     hb(c.x-30,224,-170,0,{bw:12,bh:9,col:'#e8853d',life:3});}
    if(c.st>1.3){c.state='idle';c.st=0;}break;
   case 'rain':
    if(!c.aux.spikes){c.aux.spikes=[];for(let i=0;i<6;i++)c.aux.spikes.push(c.ax+40+rnd(0,VW-90));}
    if(c.st>0.8&&!c.aux.done){c.aux.done=true;
     for(const sx of c.aux.spikes)hb(sx,10,0,320,{bw:4,bh:10,col:'#e8dcc8',life:2});}
    if(c.st>1.5){c.state='idle';c.st=0;}break;
   case 'paper':
    if(!c.aux.done){c.aux.done=true;Audio2.sfx('stun');
     for(let i=0;i<2;i++){const a=Math.atan2(player.y-12-(c.y-60),player.x-c.x)+(i-0.5)*0.4;
      hb(c.x,c.y-60,Math.cos(a)*85,Math.sin(a)*85,{bw:8,bh:6,col:'#f2f6fa',life:4,stun:true});}}
    if(c.st>1){c.state='idle';c.st=0;}break;}}
  else{ // 骨王真身：中央巨骨，环形弹+X光激光+召唤
   c.aux.lt+=dt;c.aux.st2+=dt;
   if(c.st>1.7&&c.state==='idle'){c.st=0;Audio2.sfx('fix');
    const n=14,off=rnd(0,0.5);
    for(let i=0;i<n;i++){const a=i/n*Math.PI*2+off;
     hb(c.x,c.y-45,Math.cos(a)*100,Math.sin(a)*100,{bw:5,bh:5,col:'#f2f6fa',life:3.5});}}
   if(c.aux.lt>4.2){c.aux.lt=0;c.aux.beam={high:chance(0.5),t:0};Audio2.sfx('stun');}
   if(c.aux.beam){const b=c.aux.beam;b.t+=dt;
    if(b.t>0.8&&b.t<1.4){ // 激光生效：高位需蹲，低位需跳
     const y0=b.high?170:206,y1=b.high?200:232;
     if(player.state==='normal'&&player.invT<=0&&G.superT<=0&&
      player.top()<y1&&player.y>y0)killPlayer();}
    if(b.t>1.4)c.aux.beam=null;}
   if(c.aux.st2>3.5){c.aux.st2=0;if(Ents.enemies().length<4)spawnEnemy('slime',c.ax+rnd(40,VW-80));}}},
 draw(c){
  if(c.form===1)drawDiscBeast(c,54);
  else if(c.form===2)drawFemurStatue(c,80);
  else{const X=Math.round(c.x-cam.x),Y=c.y;
   // 真身：巨型骷髅上身
   ctx.fillStyle='#e8dcc8';ctx.beginPath();ctx.arc(X,Y-70,20,0,7);ctx.fill(); // 颅骨
   ctx.fillStyle='#10131a';ctx.fillRect(X-12,Y-76,8,8);ctx.fillRect(X+4,Y-76,8,8);

   rect(c.x-4,Y-52,8,46,'#bfae8e'); // 脊柱
   for(let i=0;i<3;i++){rect(c.x-36-i*4,Y-44+i*12,12,4,'#bfae8e');rect(c.x+24+i*4,Y-44+i*12,12,4,'#bfae8e');} // 臂骨
   // 激光预警/光束
   if(c.aux.beam){const b=c.aux.beam,y=b.high?172:208;
    if(b.t<=0.8){ctx.globalAlpha=0.3+Math.sin(_last/50)*0.2;
     rect(c.ax,y,VW,b.high?28:24,'#d63d3d');ctx.globalAlpha=1;

     rect(c.ax,y+6,VW,4,'#fff');}}}}};

function spawnPressure(ev){
 const li=Level.idx,extra=li>=4?2:(li>=2?1:(chance(0.45)?1:0));
 if(extra<=0)return;
 const pools=[['slime'],['slime','spider'],['slime','spider','fly'],['spider','fly','shooter'],['shield','fly','spider','shooter']];
 const pool=pools[Math.min(li,pools.length-1)];
 for(let i=0;i<extra;i++){
  const type=pool[irnd(0,pool.length-1)],x=clamp(ev.x+230+i*58+rnd(-18,28),cam.x+220,Level.cur.len-80);
  spawnEnemy(type,x,type==='fly'?rnd(-50,10):0);
 }
}
const Level={cur:null,idx:0,checkpointX:60,evQueue:[],wave:null,bossOn:false,bossDone:false,done:false,t:0,
 load(i){this.idx=i;this.cur=LEVELS[i];this.checkpointX=60;this.evQueue=this.cur.events.slice();
  this.wave=null;this.bossOn=false;this.bossDone=false;this.done=false;this.t=0;
  Ents.clear();Bullets.clear();Nades.clear();Particles.clear();Floaters.clear();Hazards.clear();Veh.clear();
  cam.x=0;cam.lockX=null;Boss.cur=null;
  solids=this.cur.plats.slice();
  // 地形分段：[{x0,x1,y}]，段间空隙=深渊；无定义则全程平地230
  const ter=this.cur.terrain||[{x0:-1e9,x1:1e9,y:230}];
  this.ter=ter.slice().sort((a,b)=>a.x0-b.x0);
  groundY=x=>{for(const t of this.ter)if(x>=t.x0&&x<t.x1)return t.y;return null;};
  player.reset(60,230);
  Audio2.play(this.cur.bgm);},
 update(dt){this.t+=dt;
  // 事件触发
  for(let i=this.evQueue.length-1;i>=0;i--){const ev=this.evQueue[i];
   if(cam.x+VW*0.7>ev.x){this.evQueue.splice(i,1);this.fire(ev);}}
  // 波次锁镜头
  if(this.wave){if(Ents.enemies().length===0){this.wave=null;cam.lockX=null;}}
  // 存档点
  for(const cp of this.cur.checkpoints){if(player.x>cp&&this.checkpointX<cp){this.checkpointX=cp;
   Floaters.add(player.x,player.y-44,'存档点!','#9ef27a');Audio2.sfx('pickup');}}
  // BOSS
  if(this.bossOn){Boss.update(dt);
   if(this.bossDone&&!this.done){this.done=true;levelClear();}}
  // 镜头极限
  cam.x=clamp(cam.x,0,this.cur.len-VW);},
 fire(ev){switch(ev.type){
  case 'spawn':for(const s of ev.list)spawnEnemy(s[0],s[1],s[2]);break;
  case 'wave':for(const s of ev.list)spawnEnemy(s[0],s[1],s[2]);spawnPressure(ev);
   this.wave=ev;cam.lockX=Math.min(ev.x,this.cur.len-VW);break;
  case 'rescue':spawnRescue(ev.px);break;
  case 'prop':spawnProp(ev.kind,ev.px);break;
  case 'item':spawnItem(ev.kind,ev.px,ev.py,ev.wname,ev.py!==undefined);break;
  case 'veh':Veh.spawn(ev.px);break;
  case 'boss':this.bossOn=true;cam.lockX=Math.min(ev.x,this.cur.len-VW);Boss.start(ev.id);break;}},
 drawBg(){THEMES[this.cur.theme].draw(cam.x);drawTerrain();},
};
// 统一地形渲染：分段地面（含高低差侧壁）、深渊缺口警示条、单向平台
function drawTerrain(){
 const gc=THEMES[Level.cur.theme].gcol,ter=Level.ter;
 for(const t of ter){
  const x0=Math.max(t.x0,cam.x-8),x1=Math.min(t.x1,cam.x+VW+8);
  if(x1<=x0)continue;
  rect(x0,t.y,x1-x0,VH-t.y,gc.fill);   // 地体
  rect(x0,t.y,x1-x0,3,gc.top);          // 顶面
  for(let sx=Math.floor(x0/24)*24;sx<x1-12;sx+=24)
   if(sx>=x0)rect(sx,t.y+6,12,3,gc.stripe); // 纹饰
 }
 // 深渊缺口边缘警示（黄黑条）
 for(let i=0;i<ter.length;i++){const c0=ter[i],n=ter[i+1];
  if(n&&n.x0>c0.x1){
   if(c0.x1>cam.x-10&&c0.x1<cam.x+VW+10)
    for(let k=0;k<4;k++)rect(c0.x1-4,c0.y+k*7,4,4,k%2?'#f2c94c':'#10131a');
   if(n.x0>cam.x-10&&n.x0<cam.x+VW+10)
    for(let k=0;k<4;k++)rect(n.x0,n.y+k*7,4,4,k%2?'#f2c94c':'#10131a');}}
 // 单向悬浮平台
 for(const p of solids){rect(p.x,p.y,p.w,3,gc.top);rect(p.x,p.y+3,p.w,4,gc.fill);
  rect(p.x,p.y+7,p.w,1,gc.stripe);}}

 '抄起手边的骨锤和骨钉枪，微微一笑：',
 '',
 '「今晚的病例……有点多啊。」',
 '',
 '杀出重围，解救病人，通过职称考核——',
 '从实习医生一路晋升主任医师！'];
const ScnIntro={t:0,
 enter(){this.t=0;Audio2.stop();},
 update(dt){this.t+=dt;
  const total=INTRO_LINES.join('').length/14+1.5; // 全部打完所需时间
  if(Input.anyP){if(this.t<total)this.t=total; // 第一次按键：跳过打字
   else startLevel(0);}                          // 第二次按键：开始
  },
 draw(){cam.x=0;rectS(0,0,VW,VH,'#0a0d12');
  // 心电图装饰线
  ctx.strokeStyle='rgba(158,242,122,0.25)';ctx.beginPath();
  for(let k=0;k<=120;k++){const x=k*4,y=24+Math.sin((x+_last/10)/8)*((x+_last/10)%160<12?10:2);
   k?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();
  let chars=Math.floor(this.t*14),y=52;
  for(const line of INTRO_LINES){
   if(chars<=0)break;
   txt(line.slice(0,chars),VW/2,y,line.includes('「')?'#f2c94c':'#c8d4e0',10,'center');
   chars-=line.length||1;y+=16;}
  const total=INTRO_LINES.join('').length/14+1.5;
  if(this.t>total&&Math.floor(this.t*2)%2===0)
   txt('- 按任意键 开始急诊 -',VW/2,242,'#f2c94c',10,'center');
  else if(this.t<total)txt('按任意键 跳过',VW-8,VH-14,'#5a6678',8,'right');}};
/* ---- 晋升 ---- */
const ScnPromote={t:0,
 enter(){this.t=0;Audio2.stop();Audio2.sfx('promote');
  G.rank=Level.idx+1;G.lives=Math.min(6,G.lives+1);
  const unlocked=UNLOCKS[Level.idx]||[];
  this.unlocked=unlocked;
  if(unlocked.length)G.setWeapon(unlocked[0]);},
 update(dt){this.t+=dt;
  if(this.t>1.2&&Input.anyP)startLevel(Level.idx+1);},
 draw(){cam.x=0;rectS(0,0,VW,VH,'#10131a');
  const w=Math.min(1,this.t/0.5);
  // 证书展开
  rectS(VW/2-150*w,40,300*w,160,'#e8dcc8');
  if(w>=1){rectS(VW/2-144,46,288,148,'#f6efe0');
   txt('职 称 考 核 通 过',VW/2,58,'#5a4632',14,'center');
   txt('兹证明 老铁 同志通过考核，晋升为',VW/2,86,'#5a4632',9,'center');
   txt(RANKS[G.rank],VW/2,102,'#d63d3d',18,'center');
   for(let i=0;i<this.unlocked.length;i++)
    txt('解锁武器：'+WEAPONS[this.unlocked[i]].nm,VW/2,130+i*13,'#3d6fd6',9,'center');
   txt('生命 +1（当前 '+G.lives+'）',VW/2,132+this.unlocked.length*13,'#9ef27a',9,'center');
   if(this.t>1){ctx.save();ctx.translate(VW/2+92,160);ctx.rotate(-0.3);
    ctx.strokeStyle='#d63d3d';ctx.lineWidth=2;ctx.strokeRect(-24,-12,48,24);
    txt('考核通过',-20,-6,'#d63d3d',9);ctx.restore();}
   if(this.t>1.2&&Math.floor(this.t*2)%2===0)txt('- 按任意键 继续查房 -',VW/2,230,'#f2c94c',10,'center');}}};
/* ---- 游戏结束 ---- */
const ScnGameOver={t:0,
 enter(){this.t=0;Audio2.stop();Audio2.sfx('die');},
 update(dt){this.t+=dt;
 if(this.t>1&&Input.anyP){G.lives=HARD.initialLives;G.nades=HARD.initialNades;G.stunT=0;G.adrT=0;G.superT=0;startLevel(Level.idx);}},
 draw(){rectS(0,0,VW,VH,'#0a0d12');
  txt('医 疗 事 故',VW/2,80,'#d63d3d',26,'center');
  txt('老铁倒在了变异骨骼怪潮中……',VW/2,120,'#8a96a8',10,'center');
  txt('得分 '+G.score+'   救援 '+G.rescued+' 人',VW/2,140,'#c8d4e0',9,'center');
  if(this.t>1&&Math.floor(this.t*2)%2===0)txt('- 按任意键 重返本关（命数恢复5）-',VW/2,180,'#f2c94c',10,'center');}};
/* ---- 通关 ---- */
const ScnVictory={t:0,
 enter(){this.t=0;G.rank=4;Audio2.play(T_main);Audio2.sfx('promote');},
 update(dt){this.t+=dt;
  if(this.t>2&&Input.anyP)Scenes.replace(ScnTitle);},
 draw(){cam.x=0;
  // 天台日出
  const g=ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,'#1a2233');g.addColorStop(0.55,'#d63d6e');g.addColorStop(1,'#f2c94c');
  ctx.fillStyle=g;ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle='#ffe9b0';ctx.beginPath();ctx.arc(VW/2,200,28,0,7);ctx.fill();
  ctx.fillStyle='#10131a';for(let i=0;i<10;i++)ctx.fillRect(i*52,210+(i%3)*8,34,60);
  ctx.fillStyle='#0e1118';ctx.fillRect(0,240,VW,30);
  const img=bakePlayer({legs:'idle',legF:Math.floor(this.t*2)%2,aim:1,cape:true,gun:WEAPONS.gatling.gun});
  ctx.drawImage(img,VW/2-60,126,120,114);
  txt('考 核 全 部 通 过',VW/2,30,'#f2f6fa',20,'center');
  txt('主任医师 · 老铁 名扬骨科',VW/2,58,'#f2c94c',12,'center');
  txt('总分 '+G.score+'    锦旗 '+G.rescued+' 面',VW/2,80,'#f2f6fa',10,'center');
  txt('「白大褂披风暴走形态 已解锁」',VW/2,98,'#c8d4e0',9,'center');
  if(this.t>2&&Math.floor(this.t*2)%2===0)txt('- 按任意键 返回标题 -',VW/2,250,'#10131a',9,'center');}};
/* ---- 暂停 ---- */
const ScnPause={
 update(dt){if(Input.pauseP||Input.pressed.Space)Scenes.pop();},
 draw(){Scenes.stack[Scenes.stack.length-2]&&Scenes.stack[Scenes.stack.length-2].draw();
  rectS(0,0,VW,VH,'rgba(0,0,0,0.55)');
  txt('暂 停',VW/2,110,'#f2f6fa',20,'center');
  txt('P/Esc 继续  M 静音',VW/2,145,'#c8d4e0',9,'center');}};
addEventListener('blur',()=>{const s=Scenes.top();
 if(s===ScnPlay)Scenes.push(ScnPause);});

/* ==================== §10 BOOT ==================== */
Scenes.push(ScnTitle);
requestAnimationFrame(frame);
/*EOF*/</script>
